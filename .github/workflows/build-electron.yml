name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm install --ignore-scripts
        working-directory: apps/rom-manager-ui

      - name: Build frontend
        run: npm run build
        working-directory: apps/rom-manager-ui

      - name: Build Rust CLIs (release)
        run: |
          cargo build -p parse-cli --release
          cargo build -p build-cli --release
          cargo build -p nps-cli --release
          cargo build -p scraper-cli --release
          cargo build -p ia-cli --release

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }}
        working-directory: apps/rom-manager-ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            apps/rom-manager-ui/release/*.dmg
            apps/rom-manager-ui/release/*.zip
            apps/rom-manager-ui/release/*.exe
            apps/rom-manager-ui/release/*.AppImage
            apps/rom-manager-ui/release/*.deb
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
